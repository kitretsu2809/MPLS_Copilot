version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8001" # Expose to host on 8001 to match frontend fetch
    volumes:
      - ./simulator:/app/simulator
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Point back to the blazing-fast native host Ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Define the LLM to use here!
      - OLLAMA_MODEL=gpu-agent:latest
    depends_on:
      - simulator

  simulator:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "simulator.generate_telemetry"]
    volumes:
      - ./simulator:/app/simulator

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
